name: ClosetAI
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: 7.0.0

targets:
  ClosetAI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ClosetAI
    resources:
      - path: ClosetAI/Persistence/ClosetAI.xcdatamodeld
      - path: ClosetAI/Resources/Assets.xcassets
    info:
      path: ClosetAI/Info.plist
      properties:
        CFBundleDisplayName: ClosetAI
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "需要使用相机拍摄您的服装照片"
        NSPhotoLibraryUsageDescription: "需要访问相册选择服装照片，并保存穿搭效果图"
        NSPhotoLibraryAddUsageDescription: "需要保存穿搭效果图到相册"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.closetai
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        DEVELOPMENT_TEAM: KXVGUNBPP6
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        ENABLE_PREVIEWS: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          ENABLE_DEBUG_DYLIB: "NO"
        Release:
          ENABLE_DEBUG_DYLIB: "NO"
    dependencies:
      - package: Kingfisher
